<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Luxe Mobile Massage</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --accent-gold: #b89b6e;
            --text-primary: #f5f0eb;
            --text-secondary: #8a8578;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: clamp(80px, 15vw, 160px);
            color: var(--accent-gold);
            line-height: 1;
            margin-bottom: 16px;
            opacity: 0.8;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(24px, 4vw, 36px);
            margin-bottom: 16px;
        }
        p {
            color: var(--text-secondary);
            font-size: 16px;
            max-width: 480px;
            line-height: 1.7;
            margin-bottom: 32px;
        }
        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn-gold {
            background: var(--accent-gold);
            color: #0a0a0a;
        }
        .btn-gold:hover {
            background: #c9a96e;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(184,155,110,0.3);
        }
        .btn-outline {
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-primary);
        }
        .btn-outline:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            transform: translateY(-2px);
        }
        .diamond {
            color: var(--accent-gold);
            font-size: 24px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="diamond">&#9670;</div>
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let us help you find what you need.</p>
    <div class="actions">
        <a href="index.html" class="btn btn-gold">Back to Home</a>
        <a href="tel:+17252663738" class="btn btn-outline">Call (725) 266-3738</a>
    </div>
</body>
</html>
